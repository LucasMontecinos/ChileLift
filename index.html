<!DOCTYPE html>
<html lang="es">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>FECHIPO — Base de Datos de Atletas</title>
<link href="https://fonts.googleapis.com/css2?family=DM+Sans:wght@400;500;600;700&family=Oswald:wght@400;500;600;700&display=swap" rel="stylesheet">
<style>
*{margin:0;padding:0;box-sizing:border-box}
:root{--bg:#0A1628;--card:#11223B;--border:#1E3A5F;--text:#D4E1F0;--muted:#7A8FA6;--accent:#C41E3A;--accent2:#E8243C;--blue:#1E5BA8;--gold:#D4A843;--green:#22c55e}
body{font-family:'DM Sans',sans-serif;background:var(--bg);color:var(--text);min-height:100vh;-webkit-font-smoothing:antialiased}
.ctn{max-width:940px;margin:0 auto;padding:16px 20px}
input,select,button{font-family:inherit}
a{color:var(--accent);text-decoration:none}
.hdr{text-align:center;padding:20px 0 16px}
.hdr h1{font-family:'Oswald',sans-serif;font-size:clamp(22px,5vw,30px);font-weight:700;letter-spacing:3px;text-transform:uppercase}
.hdr h1 .fe{color:var(--accent)}.hdr h1 .rs{font-weight:400}
.hdr p{color:var(--muted);font-size:13px;margin-top:4px}
.hl{width:60px;height:3px;background:linear-gradient(90deg,var(--accent),var(--gold));margin:10px auto 0;border-radius:2px}
.tabs{display:flex;gap:6px;margin-bottom:16px;flex-wrap:wrap}
.tab{padding:8px 18px;border-radius:8px;border:1px solid var(--border);background:transparent;color:var(--muted);font-weight:600;font-size:12px;cursor:pointer;font-family:'Oswald',sans-serif;letter-spacing:1px;text-transform:uppercase;transition:all .2s}
.tab.a{background:var(--accent);color:#fff;border-color:var(--accent)}
.tab:hover:not(.a){border-color:var(--muted)}
.st{display:flex;gap:4px;margin-bottom:14px;flex-wrap:wrap}
.sb{padding:6px 14px;border-radius:6px;border:1px solid var(--border);background:transparent;color:var(--muted);font-size:11px;cursor:pointer;font-family:'Oswald',sans-serif;letter-spacing:.5px;text-transform:uppercase;transition:all .2s}
.sb.a{background:var(--blue);color:#fff;border-color:var(--blue)}
.fl{display:flex;gap:10px;margin-bottom:14px;flex-wrap:wrap}
.fl input{flex:1;min-width:200px;padding:11px 14px;border-radius:10px;border:1px solid var(--border);background:var(--card);color:var(--text);font-size:13px;outline:none}
.fl input:focus{border-color:var(--accent)}
.fl select{padding:10px 12px;border-radius:10px;border:1px solid var(--border);background:var(--card);color:var(--text);font-size:12px;outline:none;cursor:pointer;max-width:220px}
.cnt{color:var(--muted);font-size:12px;margin-bottom:10px}
.ar{background:var(--card);border-radius:12px;padding:12px 16px;cursor:pointer;border:1px solid var(--border);display:flex;align-items:center;justify-content:space-between;transition:border-color .2s,transform .15s;margin-bottom:6px}
.ar:hover{border-color:var(--accent);transform:translateX(3px)}
.av{width:40px;height:40px;border-radius:50%;display:flex;align-items:center;justify-content:center;font-size:13px;font-weight:700;color:#fff;flex-shrink:0}
.av.ac{background:linear-gradient(135deg,var(--accent),var(--gold))}.av.in{background:var(--border)}
.an{font-weight:600;font-size:14px;white-space:nowrap;overflow:hidden;text-overflow:ellipsis}
.am{font-size:11px;color:var(--muted)}.am .cd{color:var(--accent);font-weight:600}
.cc{background:rgba(196,30,58,.15);color:var(--accent);padding:3px 10px;border-radius:10px;font-size:11px;font-weight:600}
.bb{background:none;border:1px solid var(--border);color:var(--muted);padding:8px 16px;border-radius:8px;cursor:pointer;font-size:13px;margin-bottom:20px;transition:border-color .2s}
.bb:hover{border-color:var(--accent);color:var(--text)}
.pc{background:linear-gradient(135deg,var(--card),var(--bg));border:1px solid var(--border);border-radius:16px;padding:28px;margin-bottom:20px}
.pa{width:68px;height:68px;border-radius:50%;background:linear-gradient(135deg,var(--accent),var(--gold));display:flex;align-items:center;justify-content:center;font-size:26px;font-weight:700;color:#fff;font-family:'Oswald',sans-serif;flex-shrink:0}
.pn{font-size:clamp(18px,4vw,24px);font-weight:700;font-family:'Oswald',sans-serif;letter-spacing:.5px}
.pk{color:var(--accent);font-weight:600;font-size:14px;font-family:'Oswald',sans-serif;letter-spacing:1px}
.pg{display:grid;grid-template-columns:1fr 1fr;gap:12px}
.fd{background:var(--bg);border-radius:10px;padding:10px 14px}.fd .lb{font-size:10px;color:var(--muted);text-transform:uppercase;letter-spacing:1px;margin-bottom:2px}.fd .vl{font-size:14px;font-weight:600}
.cd2{background:var(--card);border:1px solid var(--border);border-radius:16px;padding:24px;margin-bottom:20px}
.ct{display:flex;align-items:center;justify-content:space-between;margin-bottom:16px}
.ct h2{font-size:16px;font-family:'Oswald',sans-serif;letter-spacing:1px;text-transform:uppercase}
.bg{border-radius:20px;padding:4px 12px;font-size:12px;font-weight:700}
.bx{display:grid;grid-template-columns:repeat(5,1fr);gap:10px}
.bi{background:var(--bg);border-radius:12px;padding:14px 10px;text-align:center;border:1px solid var(--border);position:relative;overflow:hidden}
.bi::before{content:'';position:absolute;top:0;left:0;right:0;height:3px;background:linear-gradient(90deg,var(--accent),var(--gold))}
.bv{font-size:clamp(18px,3.5vw,26px);font-weight:700;color:var(--gold);font-family:'Oswald',sans-serif}
.bu{font-size:11px;color:var(--muted)}.bl{font-size:10px;color:var(--muted);text-transform:uppercase;letter-spacing:.5px;margin-top:3px}
.ce{background:var(--bg);border-radius:12px;padding:16px;margin-bottom:10px;border-left:3px solid var(--border);transition:transform .15s}
.ce:hover{transform:translateX(3px)}
.tg{display:inline-block;padding:3px 10px;border-radius:20px;font-size:11px;font-weight:600;margin-right:6px;margin-bottom:6px}
.cm{display:grid;grid-template-columns:1fr 1fr 1fr;gap:6px;font-size:12px;margin-top:6px}
.cm .ll{color:var(--muted)}.cm .vv{font-weight:600}
.rb{display:flex;gap:6px;margin-top:10px;flex-wrap:wrap}
.rp{background:rgba(212,168,67,.08);border:1px solid rgba(212,168,67,.2);border-radius:8px;padding:5px 8px;text-align:center;flex:1;min-width:55px}
.rp .rv{font-size:15px;font-weight:700;color:var(--gold);font-family:'Oswald',sans-serif}
.rp .rl{font-size:9px;color:var(--muted);text-transform:uppercase;letter-spacing:.3px;margin-top:1px}
.rk{background:linear-gradient(135deg,var(--accent),var(--gold));color:#fff;border-radius:8px;padding:5px 12px;font-weight:700;font-family:'Oswald',sans-serif;font-size:13px;display:inline-flex;align-items:center;gap:4px;margin-top:8px}
.sc{background:var(--card);border-radius:12px;padding:20px;text-align:center;border:1px solid var(--border)}
.sn{font-size:clamp(24px,5vw,34px);font-weight:700;font-family:'Oswald',sans-serif}
.sl{font-size:11px;color:var(--muted);text-transform:uppercase;letter-spacing:1px;margin-top:4px}
.rr{display:grid;grid-template-columns:40px 1fr 80px 60px 1fr 70px;gap:8px;padding:10px 12px;border-bottom:1px solid rgba(30,58,95,.4);font-size:13px;align-items:center}
.rr:hover{background:rgba(196,30,58,.04)}
.rh{font-weight:600;color:var(--muted);font-size:11px;text-transform:uppercase;letter-spacing:.5px;border-bottom:2px solid var(--border)}
.rpos{color:var(--gold);font-weight:700;font-family:'Oswald',sans-serif}
.rmk{color:var(--accent);font-weight:700;font-size:15px;font-family:'Oswald',sans-serif}
.emp{color:var(--muted);text-align:center;padding:40px 20px;font-size:14px}
.ftr{text-align:center;padding:30px 0;color:var(--muted);font-size:11px;border-top:1px solid var(--border);margin-top:40px}
.ld{display:flex;flex-direction:column;align-items:center;justify-content:center;min-height:60vh;gap:16px}
.sp{width:40px;height:40px;border:3px solid var(--border);border-top-color:var(--accent);border-radius:50%;animation:spin .8s linear infinite}
@keyframes spin{to{transform:rotate(360deg)}}
@media(max-width:640px){.fl{flex-direction:column}.fl select{max-width:none}.pg{grid-template-columns:1fr}.cm{grid-template-columns:1fr}.bx{grid-template-columns:repeat(3,1fr)}.rr{grid-template-columns:30px 1fr 60px 50px 1fr 55px;font-size:11px;gap:4px}.rp{min-width:48px;padding:4px 5px}.rp .rv{font-size:13px}}
</style>
</head>
<body>
<div class="ctn" id="app"><div class="ld"><div class="sp"></div><p>Cargando base de datos...</p></div></div>
<script>
const CC={"Campeonato Nacional FECHIPO 2026":{bg:"#fef3c7",b:"#f59e0b",t:"#92400e",n:"Nacional 2026"},"Campeonato Nacional FECHIPO 2025":{bg:"#dbeafe",b:"#3b82f6",t:"#1e40af",n:"Nacional 2025"},"Regional Centro Norte 2025":{bg:"#dcfce7",b:"#22c55e",t:"#166534",n:"Reg. Centro Norte 2025"},"Regional Sur Austral 2025":{bg:"#f3e8ff",b:"#a855f7",t:"#6b21a8",n:"Reg. Sur Austral 2025"},"Zonal Centro Clausura 2024":{bg:"#ffe4e6",b:"#f43f5e",t:"#9f1239",n:"Zonal Centro 2024"},"Campeonato Nacional 2025":{bg:"#fef9c3",b:"#eab308",t:"#713f12",n:"Nacional 2025 ⚡"},"Campeonato Nacional 2023":{bg:"#e0f2fe",b:"#0ea5e9",t:"#0c4a6e",n:"Nacional 2023 ⚡"},"Zonal Sur Los Toros 2025":{bg:"#ecfdf5",b:"#10b981",t:"#064e3b",n:"Zonal Sur 2025 ⚡"},"Regional Centro 2025":{bg:"#fdf4ff",b:"#c084fc",t:"#581c87",n:"Reg. Centro 2025 ⚡"},"Nacional Universitario 2026":{bg:"#fce4ec",b:"#C41E3A",t:"#7f1d1d",n:"Universitario 2026 ⚡"}};
let D=[],R={},ST={v:"list",s:"",fc:"",fk:"",sel:null,p:0,rt:"classic",rl:"sq"};
function I(n){return n.split(" ").map(w=>w[0]).filter(Boolean).slice(0,2).join("").toUpperCase()}
function cls(){return[...new Set(D.map(a=>a.club).filter(Boolean))].sort()}
function cps(){return[...new Set(D.flatMap(a=>a.competencias.map(c=>c.evento)))].sort()}
function flt(){const s=ST.s.toLowerCase();return D.filter(a=>{if(s&&!a.nombre.toLowerCase().includes(s)&&!a.codigo.toLowerCase().includes(s)&&!a.rut.includes(s))return false;if(ST.fc&&a.club!==ST.fc)return false;if(ST.fk&&!a.competencias.some(c=>c.evento===ST.fk))return false;return true})}
function tg(e){const c=CC[e]||{bg:"#f1f5f9",b:"#94a3b8",t:"#334155",n:e};return`<span class="tg" style="background:${c.bg};border:1.5px solid ${c.b};color:${c.t}">${c.n}</span>`}

function prof(a){
  const F=[["RUT",a.rut],["Fecha Nac.",a.fechaNac],["Club",a.club],["Debut",a.debut]];
  let h=`<button class="bb" onclick="bk()">← Volver</button><div class="pc"><div style="display:flex;align-items:center;gap:16px;margin-bottom:20px"><div class="pa">${I(a.nombre)}</div><div><div class="pn">${a.nombre}</div><div class="pk">${a.codigo}</div></div></div><div class="pg">${F.map(([l,v])=>`<div class="fd"><div class="lb">${l}</div><div class="vl">${v||"—"}</div></div>`).join("")}</div></div>`;
  if(a.bestLifts&&Object.keys(a.bestLifts).length){const b=a.bestLifts,L={sq:'Squat',bp:'Bench',dl:'Deadlift',total:'Total',glp:'GL Pts'},U={sq:'kg',bp:'kg',dl:'kg',total:'kg',glp:'pts'};
    h+=`<div class="cd2"><div class="ct"><h2>Mejores Levantamientos (PR)</h2></div><div class="bx">${Object.entries(L).map(([k,l])=>b[k]?`<div class="bi"><div class="bv">${b[k]}<span class="bu"> ${U[k]}</span></div><div class="bl">${l}</div></div>`:'').join('')}</div></div>`}
  h+=`<div class="cd2"><div class="ct"><h2>Historial Competitivo</h2><span class="bg" style="background:var(--accent);color:#fff">${a.competencias.length}</span></div>`;
  if(!a.competencias.length)h+=`<div class="emp">Sin competencias registradas</div>`;
  else a.competencias.forEach(c=>{const cl=(CC[c.evento]||{}).b||"#64748b",r=c.resultado;
    h+=`<div class="ce" style="border-left-color:${cl}">${tg(c.evento)}<div class="cm"><div><span class="ll">División: </span><span class="vv">${c.division||"—"}</span></div><div><span class="ll">Categoría: </span><span class="vv">${c.categoria||"—"}</span></div><div><span class="ll">Modalidad: </span><span class="vv">${c.modalidad||"—"}</span></div></div>`;
    if(r){h+=`<div class="rb">`;if(r.bw)h+=`<div class="rp"><div class="rv">${r.bw}</div><div class="rl">BW</div></div>`;if(r.sq)h+=`<div class="rp"><div class="rv">${r.sq}</div><div class="rl">SQ</div></div>`;if(r.bp)h+=`<div class="rp"><div class="rv">${r.bp}</div><div class="rl">BP</div></div>`;if(r.dl)h+=`<div class="rp"><div class="rv">${r.dl}</div><div class="rl">DL</div></div>`;if(r.total)h+=`<div class="rp"><div class="rv">${r.total}</div><div class="rl">Total</div></div>`;if(r.glp)h+=`<div class="rp"><div class="rv">${r.glp}</div><div class="rl">GL</div></div>`;h+=`</div>`;if(r.rank)h+=`<div class="rk">#${r.rank}</div>`}
    h+=`</div>`});
  return h+`</div>`}

function sts(){const w=D.filter(a=>a.competencias.length>0).length,t=D.reduce((s,a)=>s+a.competencias.length,0),tp=[...D].filter(a=>a.competencias.length>0).sort((a,b)=>b.competencias.length-a.competencias.length).slice(0,10),cc={};D.forEach(a=>{if(a.club)cc[a.club]=(cc[a.club]||0)+1});const tc=Object.entries(cc).sort((a,b)=>b[1]-a[1]).slice(0,10);
  return`<div style="display:grid;grid-template-columns:repeat(3,1fr);gap:12px;margin-bottom:20px"><div class="sc"><div class="sn" style="color:var(--blue)">${D.length}</div><div class="sl">Total Atletas</div></div><div class="sc"><div class="sn" style="color:var(--green)">${w}</div><div class="sl">Con Competencias</div></div><div class="sc"><div class="sn" style="color:var(--gold)">${t}</div><div class="sl">Participaciones</div></div></div><div style="display:grid;grid-template-columns:1fr 1fr;gap:16px"><div class="cd2"><div class="ct"><h2 style="color:var(--gold)">Top Atletas</h2></div>${tp.map((a,i)=>`<div style="display:flex;justify-content:space-between;padding:8px 0;border-bottom:1px solid rgba(30,58,95,.3);cursor:pointer" onclick="sl('${a.codigo.replace(/'/g,"\\'")}')"><div style="display:flex;gap:8px;align-items:center"><span style="color:var(--gold);font-weight:700;width:20px">${i+1}.</span><span style="font-size:13px">${a.nombre}</span></div><span style="background:rgba(212,168,67,.15);color:var(--gold);padding:2px 10px;border-radius:10px;font-size:12px;font-weight:600">${a.competencias.length}</span></div>`).join('')}</div><div class="cd2"><div class="ct"><h2 style="color:var(--blue)">Top Clubes</h2></div>${tc.map(([c,n],i)=>`<div style="display:flex;justify-content:space-between;padding:8px 0;border-bottom:1px solid rgba(30,58,95,.3)"><div style="display:flex;gap:8px;align-items:center"><span style="color:var(--blue);font-weight:700;width:20px">${i+1}.</span><span style="font-size:13px">${c}</span></div><span style="background:rgba(30,91,168,.15);color:var(--blue);padding:2px 10px;border-radius:10px;font-size:12px;font-weight:600">${n}</span></div>`).join('')}</div></div>`}

function rec(){const ts=[["classic","Classic"],["equipped","Equipado"]],ls=[["sq","Sentadilla"],["bp","Press Banca"],["dl","Peso Muerto"],["total","Total"]];
  let h=`<div class="st">${ts.map(([k,l])=>`<button class="sb ${ST.rt===k?'a':''}" onclick="sr('${k}',null)">${l}</button>`).join('')}</div><div class="st" style="margin-bottom:16px">${ls.map(([k,l])=>`<button class="sb ${ST.rl===k?'a':''}" onclick="sr(null,'${k}')">${l}</button>`).join('')}</div>`;
  const d=R[ST.rt]&&R[ST.rt][ST.rl]||[],ln=ls.find(l=>l[0]===ST.rl)?.[1]||'',tn=ts.find(t=>t[0]===ST.rt)?.[1]||'';
  h+=`<div class="cd2"><div class="ct"><h2>Records ${ln} ${tn}</h2><span class="bg" style="background:var(--gold);color:var(--bg)">${d.length}</span></div>`;
  if(!d.length)h+=`<div class="emp">No hay records registrados</div>`;
  else{h+=`<div class="rr rh"><div>#</div><div>Atleta</div><div>División</div><div>Cat.</div><div>Campeonato</div><div>Marca</div></div>`;
    d.forEach((r,i)=>{h+=`<div class="rr"><div class="rpos">${i+1}</div><div>${r.nombre}</div><div>${r.division}</div><div>${r.categoria}</div><div style="font-size:11px;color:var(--muted)">${(r.campeonato||'').substring(0,35)}</div><div class="rmk">${r.marca} kg</div></div>`})}
  return h+`</div>`}

function lst(){const f=flt(),P=50,sh=f.slice(0,(ST.p+1)*P);
  let h=`<div class="fl"><input type="text" placeholder="Buscar por nombre, código o RUT..." value="${ST.s}" oninput="ss(this.value)"><select onchange="sfc(this.value)"><option value="">Todos los clubes</option>${cls().map(c=>`<option value="${c}" ${ST.fc===c?'selected':''}>${c}</option>`).join('')}</select><select onchange="sfk(this.value)"><option value="">Todas las competencias</option>${cps().map(c=>`<option value="${c}" ${ST.fk===c?'selected':''}>${c}</option>`).join('')}</select></div><div class="cnt">${f.length} atletas encontrados</div>`;
  sh.forEach(a=>{h+=`<div class="ar" onclick="sl('${a.codigo.replace(/'/g,"\\'")}')"><div style="display:flex;align-items:center;gap:12px;overflow:hidden"><div class="av ${a.competencias.length?'ac':'in'}">${I(a.nombre)}</div><div style="overflow:hidden"><div class="an">${a.nombre}</div><div class="am"><span class="cd">${a.codigo}</span>${a.club?' · '+a.club:''}</div></div></div><div style="display:flex;align-items:center;gap:8px;flex-shrink:0">${a.bestLifts&&a.bestLifts.total?`<span style="font-size:11px;color:var(--gold);font-weight:600">${a.bestLifts.total}kg</span>`:''} ${a.competencias.length?`<span class="cc">${a.competencias.length}</span>`:''}<span style="color:#3a5577;font-size:18px">›</span></div></div>`});
  if(f.length>sh.length)h+=`<div style="text-align:center;padding:20px"><button class="tab" onclick="mp()" style="border-color:var(--accent);color:var(--accent)">Cargar más (${f.length-sh.length})</button></div>`;
  return h}

function render(){const app=document.getElementById("app");
  let h=`<div class="hdr"><h1><span class="fe">FECHIPO</span> <span class="rs">Athlete Database</span></h1><p>Federación Chilena de Powerlifting — Afiliada a IPF & WADA</p><div class="hl"></div></div>`;
  if(ST.sel)h+=prof(ST.sel);
  else{h+=`<div class="tabs">${[["list","Atletas"],["stats","Estadísticas"],["records","Records"]].map(([v,l])=>`<button class="tab ${ST.v===v?'a':''}" onclick="sv('${v}')">${l}</button>`).join('')}</div>`;
    if(ST.v==="stats")h+=sts();else if(ST.v==="records")h+=rec();else h+=lst()}
  h+=`<div class="ftr">FECHIPO — Federación Chilena de Powerlifting · Afiliada a IPF & WADA<br>Resultados ⚡ vía <a href="https://www.openpowerlifting.org" target="_blank">OpenPowerlifting.org</a> (Public Domain)</div>`;
  app.innerHTML=h;if(!ST.sel&&ST.v==="list"){const i=app.querySelector('.fl input');if(i){i.focus();i.setSelectionRange(i.value.length,i.value.length)}}}

function sv(v){ST.v=v;ST.p=0;render();scrollTo(0,0)}
function ss(v){ST.s=v;ST.p=0;render()}
function sfc(v){ST.fc=v;ST.p=0;render()}
function sfk(v){ST.fk=v;ST.p=0;render()}
function sl(c){ST.sel=D.find(a=>a.codigo===c);render();scrollTo(0,0)}
function bk(){ST.sel=null;render()}
function mp(){ST.p++;render()}
function sr(t,l){if(t)ST.rt=t;if(l)ST.rl=l;render()}

Promise.all([fetch("data.json").then(r=>r.json()),fetch("records.json").then(r=>r.json()).catch(()=>({}))]).then(([d,r])=>{D=d;R=r;render()}).catch(e=>{document.getElementById("app").innerHTML=`<div class="ld"><p style="color:var(--accent);font-weight:600">Error cargando datos</p><p style="color:var(--muted);font-size:13px">${e.message}</p></div>`});
</script>
</body>
</html>
