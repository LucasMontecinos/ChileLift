<!DOCTYPE html>
<html lang="es">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width,initial-scale=1">
<title>Ranking FECHIPO 2026</title>
<link href="https://fonts.googleapis.com/css2?family=Oswald:wght@300;400;500;600;700&family=Source+Sans+3:wght@300;400;600&display=swap" rel="stylesheet">
<style>
:root{--bg:#0a0a0f;--card:#12121a;--border:#1e1e2e;--text:#e8e6e3;--muted:#6b7280;--gold:#d4a843;--red:#c41e3a;--green:#22c55e;--blue:#3b82f6;--f-color:#e879a0;--m-color:#60a5fa}
*{margin:0;padding:0;box-sizing:border-box}
body{background:var(--bg);color:var(--text);font-family:'Source Sans 3',sans-serif;min-height:100vh}
.os{font-family:'Oswald',sans-serif}
a{color:var(--gold);text-decoration:none}

.header{background:linear-gradient(135deg,#0d0d15 0%,#1a0a0f 100%);border-bottom:1px solid var(--border);padding:16px 20px;display:flex;align-items:center;justify-content:space-between;gap:12px;flex-wrap:wrap}
.header-left{display:flex;align-items:center;gap:12px}
.header img{height:40px}
.header h1{font-family:'Oswald';font-size:20px;font-weight:700;letter-spacing:2px;color:var(--gold)}
.header h1 span{color:var(--red)}
.back-link{font-size:13px;color:var(--muted);display:flex;align-items:center;gap:4px}

.container{max-width:1100px;margin:0 auto;padding:16px}

/* Year selector */
.year-bar{display:flex;align-items:center;justify-content:space-between;margin-bottom:20px;flex-wrap:wrap;gap:10px}
.year-bar h2{font-family:'Oswald';font-size:28px;font-weight:700;letter-spacing:2px}
.year-bar h2 span{color:var(--gold)}
.year-pills{display:flex;gap:6px}
.year-pill{padding:6px 16px;border-radius:20px;border:1px solid var(--border);background:transparent;color:var(--muted);font-family:'Oswald';font-size:14px;cursor:pointer;transition:.2s}
.year-pill.active{background:var(--gold);color:#000;border-color:var(--gold);font-weight:600}

/* Modal tabs */
.modal-tabs{display:flex;gap:4px;margin-bottom:16px;overflow-x:auto;padding-bottom:4px}
.modal-tab{padding:8px 18px;border-radius:8px;border:1px solid var(--border);background:transparent;color:var(--muted);font-family:'Oswald';font-size:13px;letter-spacing:.5px;cursor:pointer;white-space:nowrap;transition:.2s}
.modal-tab.active{background:var(--red);color:#fff;border-color:var(--red);font-weight:600}
.modal-tab.f{border-left:3px solid var(--f-color)}
.modal-tab.m{border-left:3px solid var(--m-color)}
.modal-tab.active.f{background:var(--f-color);border-color:var(--f-color);color:#000}
.modal-tab.active.m{background:var(--m-color);border-color:var(--m-color);color:#000}

/* Category sections */
.cat-section{margin-bottom:24px}
.cat-header{font-family:'Oswald';font-size:16px;font-weight:600;letter-spacing:1px;padding:10px 14px;background:linear-gradient(90deg,rgba(196,30,58,.15),transparent);border-left:3px solid var(--red);margin-bottom:8px;border-radius:0 6px 6px 0;display:flex;align-items:center;gap:8px}
.cat-header .badge{font-size:11px;background:var(--red);color:#fff;padding:2px 8px;border-radius:10px}

/* Ranking table */
.rank-table{width:100%;border-collapse:collapse;font-size:13px}
.rank-table th{text-align:left;padding:8px 10px;font-family:'Oswald';font-size:11px;letter-spacing:1px;color:var(--muted);border-bottom:1px solid var(--border);text-transform:uppercase}
.rank-table th.num{text-align:center;width:36px}
.rank-table th.lift{text-align:center;width:55px}
.rank-table td{padding:7px 10px;border-bottom:1px solid rgba(30,30,46,.5)}
.rank-table td.num{text-align:center;font-family:'Oswald';font-weight:700;color:var(--gold)}
.rank-table td.lift{text-align:center;font-family:'Oswald';font-weight:600}
.rank-table tr:hover{background:rgba(212,168,67,.04)}
.rank-table tr.top1 td.num{color:#ffd700;font-size:16px}
.rank-table tr.top2 td.num{color:#c0c0c0;font-size:15px}
.rank-table tr.top3 td.num{color:#cd7f32;font-size:14px}
.rank-table .club{color:var(--muted);font-size:11px}
.rank-table .evento{color:var(--muted);font-size:10px;display:block;margin-top:1px}
.rank-table .total-cell{color:var(--gold);font-weight:700;font-size:15px}
.rank-table .gl-cell{color:var(--green);font-weight:600;font-size:12px}

.empty-msg{text-align:center;padding:40px;color:var(--muted);font-style:italic}

/* Stats bar */
.stats-bar{display:flex;gap:16px;margin-bottom:20px;flex-wrap:wrap}
.stat-card{background:var(--card);border:1px solid var(--border);border-radius:10px;padding:14px 18px;flex:1;min-width:120px;text-align:center}
.stat-card .val{font-family:'Oswald';font-size:28px;font-weight:700;color:var(--gold)}
.stat-card .lbl{font-size:11px;color:var(--muted);margin-top:2px}

/* Search */
.search-box{width:100%;padding:10px 14px;background:var(--card);border:1px solid var(--border);border-radius:8px;color:var(--text);font-size:14px;margin-bottom:16px;outline:none;transition:.2s}
.search-box:focus{border-color:var(--gold)}

@media(max-width:600px){
  .rank-table{font-size:11px}
  .rank-table th,.rank-table td{padding:5px 6px}
  .rank-table .evento{display:none}
  .header h1{font-size:16px}
}
</style>
</head>
<body>
<div class="header">
  <div class="header-left">
    <img src="Fechipo_LogoColor_transparent.png" alt="FECHIPO" onerror="this.style.display='none'">
    <h1>RANKING <span>FECHIPO</span></h1>
  </div>
  <a href="index.html" class="back-link">← YourLift</a>
</div>

<div class="container" id="app">
  <div style="text-align:center;padding:60px;color:var(--muted)">Cargando datos...</div>
</div>

<script>
let DB=[], YEAR=2026, MODE='classic_m';

const CATS_F=['47','52','57','63','69','76','84','84+'];
const CATS_M=['53','59','66','74','83','93','105','120','120+'];
const DIVS=['Sub Junior','Junior','Open','Master I','Master II','Master III'];

function nrm(s){return(s||'').normalize('NFD').replace(/[\u0300-\u036f]/g,'').toLowerCase().trim()}
function sexFromCat(cat){return CATS_F.includes(cat)?'F':CATS_M.includes(cat)?'M':'?'}
function ipfGL(total,bw,sex){
  if(!total||!bw||bw<=0)return 0;
  const coeff=sex==='F'?610.32796-1045.59282*Math.exp(-0.03048*bw):1199.72839-1025.18162*Math.exp(-0.00921093*bw);
  return coeff>0?Math.round(total*100/coeff*1000)/1000:0;
}

function getYear(evento){const m=(evento||'').match(/(20\d{2})/);return m?parseInt(m[1]):0}

function buildRanking(){
  const isBench=MODE.startsWith('bench');
  const isFem=MODE.endsWith('_f');
  const cats=isFem?CATS_F:CATS_M;
  const search=document.getElementById('searchInput')?.value||'';
  const sn=nrm(search);

  // Collect best results per athlete for the selected year
  const rankings={};// key: "cat|div" -> [{name,club,evento,sq,bp,dl,total,gl,bw}]

  DB.forEach(a=>{
    if(isBench){
      // Only Bench: check onlyBench array
      (a.onlyBench||[]).forEach(ob=>{
        if(getYear(ob.campeonato)!==YEAR) return;
        const sex=sexFromCat(ob.cat);
        if((isFem&&sex!=='F')||(!isFem&&sex!=='M')) return;
        if(sn&&!nrm(a.nombre).includes(sn)&&!nrm(a.club).includes(sn)) return;
        const key=ob.cat+'|'+ob.div.replace(/\s*Only\s*Bench/i,'').trim();
        if(!rankings[key])rankings[key]=[];
        rankings[key].push({
          name:a.nombre,club:a.club||'',evento:ob.campeonato,
          bp:ob.bp,total:0,gl:ob.gl,bw:ob.bw,sq:0,dl:0,isBench:true
        });
      });
    } else {
      // Classic: check competencias
      (a.competencias||[]).forEach(c=>{
        if(getYear(c.evento)!==YEAR) return;
        const r=c.resultado;
        if(!r||!r.total) return;
        const cat=r.categoria||'';
        const div=r.division||'';
        const sex=sexFromCat(cat);
        if((isFem&&sex!=='F')||(!isFem&&sex!=='M')) return;
        if(sn&&!nrm(a.nombre).includes(sn)&&!nrm(a.club).includes(sn)) return;
        const key=cat+'|'+div;
        if(!rankings[key])rankings[key]=[];
        // Keep only best result per athlete per category
        const existing=rankings[key].find(x=>nrm(x.name)===nrm(a.nombre));
        const entry={
          name:a.nombre,club:a.club||'',evento:c.evento,
          sq:parseFloat(r.sq)||0,bp:parseFloat(r.bp)||0,dl:parseFloat(r.dl)||0,
          total:parseFloat(r.total)||0,
          gl:parseFloat(r.glp||r.gl)||ipfGL(parseFloat(r.total)||0,parseFloat(r.pesoCorporal||r.bw)||0,isFem?'F':'M'),
          bw:parseFloat(r.pesoCorporal||r.bw)||0,isBench:false
        };
        if(existing){
          if(entry.gl>existing.gl) Object.assign(existing,entry);
        } else {
          rankings[key].push(entry);
        }
      });
    }
  });

  // Sort each category by GL points
  Object.values(rankings).forEach(arr=>{
    if(isBench) arr.sort((a,b)=>b.gl-a.gl);
    else arr.sort((a,b)=>b.gl-a.gl);
  });

  // Count stats
  let totalAthletes=0, totalEntries=0;
  Object.values(rankings).forEach(arr=>{totalAthletes+=arr.length;totalEntries+=arr.length});

  // Render
  let h='';

  // Stats
  const catCount=Object.keys(rankings).length;
  h+='<div class="stats-bar">';
  h+='<div class="stat-card"><div class="val">'+totalAthletes+'</div><div class="lbl">Atletas</div></div>';
  h+='<div class="stat-card"><div class="val">'+catCount+'</div><div class="lbl">Categorías</div></div>';
  h+='<div class="stat-card"><div class="val">'+YEAR+'</div><div class="lbl">Temporada</div></div>';
  h+='</div>';

  // Search
  h+='<input type="text" class="search-box" id="searchInput" placeholder="Buscar atleta o club..." value="'+search+'" oninput="buildRanking()">';

  // Generate tables per category
  const sortedKeys=Object.keys(rankings).sort((a,b)=>{
    const [ca,da]=a.split('|');
    const [cb,db_]=b.split('|');
    const cna=parseFloat(ca.replace('+',''))||999;
    const cnb=parseFloat(cb.replace('+',''))||999;
    if(cna!==cnb) return cna-cnb;
    return DIVS.indexOf(da)-DIVS.indexOf(db_);
  });

  if(sortedKeys.length===0){
    h+='<div class="empty-msg">No hay resultados '+(isBench?'Only Bench':'')+' para '+YEAR+(sn?' con "'+search+'"':'')+'</div>';
  }

  sortedKeys.forEach(key=>{
    const [cat,div]=key.split('|');
    const arr=rankings[key];
    if(!arr.length) return;

    h+='<div class="cat-section">';
    h+='<div class="cat-header"><span>'+cat+' kg</span><span>'+div+'</span><span class="badge">'+arr.length+' atletas</span></div>';

    h+='<table class="rank-table"><thead><tr>';
    h+='<th class="num">#</th><th>Nombre</th>';
    if(!isBench){
      h+='<th class="lift">SQ</th><th class="lift">BP</th><th class="lift">DL</th>';
    } else {
      h+='<th class="lift">BP</th>';
    }
    h+='<th class="lift">Total</th><th class="lift">GL</th>';
    h+='</tr></thead><tbody>';

    arr.forEach((r,i)=>{
      const cls=i===0?'top1':i===1?'top2':i===2?'top3':'';
      h+='<tr class="'+cls+'">';
      h+='<td class="num">'+(i+1)+'</td>';
      h+='<td><div style="font-weight:600">'+r.name+'</div><span class="club">'+r.club+'</span><span class="evento">'+r.evento+'</span></td>';
      if(!isBench){
        h+='<td class="lift">'+r.sq+'</td>';
        h+='<td class="lift">'+r.bp+'</td>';
        h+='<td class="lift">'+r.dl+'</td>';
        h+='<td class="lift total-cell">'+r.total+'</td>';
      } else {
        h+='<td class="lift">'+r.bp+'</td>';
        h+='<td class="lift">—</td>';
      }
      h+='<td class="lift gl-cell">'+r.gl.toFixed(1)+'</td>';
      h+='</tr>';
    });

    h+='</tbody></table></div>';
  });

  document.getElementById('content').innerHTML=h;
}

function setMode(m){
  MODE=m;
  document.querySelectorAll('.modal-tab').forEach(t=>{
    t.classList.toggle('active',t.dataset.mode===m);
  });
  buildRanking();
}

function setYear(y){
  YEAR=y;
  document.querySelectorAll('.year-pill').forEach(p=>{
    p.classList.toggle('active',parseInt(p.dataset.year)===y);
  });
  document.querySelector('.year-bar h2 span').textContent=y;
  buildRanking();
}

function init(){
  // Find available years from competitions
  const years=new Set();
  DB.forEach(a=>{
    (a.competencias||[]).forEach(c=>{
      const y=getYear(c.evento);
      if(y>=2024) years.add(y);
    });
  });
  const sortedYears=[...years].sort((a,b)=>b-a);

  let h='<div class="year-bar"><h2 class="os">RANKING <span>'+YEAR+'</span></h2><div class="year-pills">';
  sortedYears.forEach(y=>{
    h+='<button class="year-pill'+(y===YEAR?' active':'')+'" data-year="'+y+'" onclick="setYear('+y+')">'+y+'</button>';
  });
  h+='</div></div>';

  h+='<div class="modal-tabs">';
  h+='<button class="modal-tab m active" data-mode="classic_m" onclick="setMode(\'classic_m\')">🏋️ Classic Masculino</button>';
  h+='<button class="modal-tab f" data-mode="classic_f" onclick="setMode(\'classic_f\')">🏋️ Classic Femenino</button>';
  h+='<button class="modal-tab m" data-mode="bench_m" onclick="setMode(\'bench_m\')">💪 Only Bench Masculino</button>';
  h+='<button class="modal-tab f" data-mode="bench_f" onclick="setMode(\'bench_f\')">💪 Only Bench Femenino</button>';
  h+='</div>';

  h+='<div id="content"></div>';
  document.getElementById('app').innerHTML=h;
  buildRanking();
}

fetch('data.json').then(r=>r.json()).then(d=>{DB=d;init()}).catch(e=>{
  document.getElementById('app').innerHTML='<div style="text-align:center;padding:60px;color:var(--red)">Error cargando datos: '+e.message+'</div>';
});
</script>
</body>
</html>
