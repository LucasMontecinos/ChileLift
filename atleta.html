<!DOCTYPE html>
<html lang="es">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>YourLift — Perfil de Atleta</title>
<link href="https://fonts.googleapis.com/css2?family=Oswald:wght@400;600;700&family=DM+Sans:wght@400;500;600&display=swap" rel="stylesheet">
<style>
*{margin:0;padding:0;box-sizing:border-box}
:root{--bg:#0A1628;--card:#0f1e35;--border:#1E3A5F;--text:#D4E1F0;--muted:#7A8FA6;--accent:#C41E3A;--green:#22c55e;--gold:#D4A843;--blue:#3b82f6;--orange:#f59e0b;--red:#ef4444}
body{font-family:'DM Sans',sans-serif;background:var(--bg);color:var(--text);min-height:100vh}
.os{font-family:'Oswald',sans-serif}
.wrap{max-width:820px;margin:0 auto;padding:14px 14px 60px}
.card{background:var(--card);border:1px solid var(--border);border-radius:14px;padding:18px;margin-bottom:14px}
.card-accent{border-left:4px solid var(--accent)}
.badge{display:inline-block;padding:3px 10px;border-radius:20px;font-size:11px;font-weight:600;letter-spacing:.3px}
.b-g{background:rgba(34,197,94,.15);color:var(--green);border:1px solid rgba(34,197,94,.3)}
.b-r{background:rgba(196,30,58,.15);color:var(--accent);border:1px solid rgba(196,30,58,.3)}
.b-y{background:rgba(212,168,67,.15);color:var(--gold);border:1px solid rgba(212,168,67,.3)}
.b-b{background:rgba(59,130,246,.15);color:var(--blue);border:1px solid rgba(59,130,246,.3)}
.inp{background:var(--card);border:1px solid var(--border);border-radius:10px;color:var(--text);padding:12px 16px;font-size:15px;font-family:'DM Sans';outline:none;width:100%;transition:border-color .15s}
.inp:focus{border-color:var(--accent)}
.btn{padding:12px 20px;border-radius:10px;border:none;font-family:'Oswald';font-size:13px;font-weight:700;letter-spacing:1px;cursor:pointer;transition:all .15s}
.btn-r{background:var(--accent);color:#fff}
.sec-title{font-family:'Oswald';font-size:11px;letter-spacing:2px;color:var(--muted);margin-bottom:10px;text-transform:uppercase}
.comp-row{display:flex;justify-content:space-between;align-items:flex-start;padding:10px 0;border-bottom:1px solid rgba(30,58,95,.35)}
.comp-row:last-child{border-bottom:none}
.lift-box{flex:1;text-align:center;padding:8px 4px;background:var(--bg);border-radius:8px}
.bar-bg{background:rgba(30,58,95,.35);border-radius:4px;height:7px;overflow:hidden;margin-top:4px}
.bar-fill{height:100%;border-radius:4px;transition:width .5s}
.nav{display:flex;justify-content:space-between;align-items:center;padding:14px 14px 0;max-width:820px;margin:0 auto}
.search-row{display:flex;gap:10px;margin-bottom:20px}
.result-item{display:flex;justify-content:space-between;align-items:center;padding:12px 14px;background:var(--card);border:1px solid var(--border);border-radius:10px;margin-bottom:8px;cursor:pointer;transition:border-color .15s}
.result-item:hover{border-color:var(--accent)}
.empty{text-align:center;padding:50px 20px;color:var(--muted)}
</style>
</head>
<body>

<div class="nav">
  <a href="index.html" style="font-family:Oswald;font-size:18px;font-weight:700;letter-spacing:2px;color:var(--text)">YOUR<span style="color:var(--accent)">LIFT</span></a>
  <span style="font-size:12px;color:var(--muted)">Perfil Atleta</span>
</div>

<div class="wrap">
  <div id="searchSection">
    <h1 class="os" style="font-size:clamp(20px,5vw,30px);font-weight:700;letter-spacing:2px;margin:20px 0 6px">
      BUSCAR <span style="color:var(--accent)">ATLETA</span>
    </h1>
    <p style="color:var(--muted);font-size:13px;margin-bottom:18px">Busca por nombre o código FECHIPO. No se muestra el RUT.</p>
    <div class="search-row">
      <input class="inp" id="sInput" placeholder="Nombre o código FECHIPO..." autocomplete="off"
        oninput="onSearch(this.value)" onkeydown="if(event.key==='Enter')doSearch()">
      <button class="btn btn-r" onclick="doSearch()">Buscar</button>
    </div>
    <div id="sResults"></div>
  </div>
  <div id="profileSection" style="display:none"></div>
</div>

// ── Firebase ─────────────────────────────────────────────
(async()=>{
  try{
    const {initializeApp}=await import('https://www.gstatic.com/firebasejs/10.12.0/firebase-app.js');
    const fb=await import('https://www.gstatic.com/firebasejs/10.12.0/firebase-firestore.js');
    const app=initializeApp(FB_CFG);
    const db=fb.getFirestore(app);
    fb.onSnapshot(fb.collection(db,'inscripciones'),snap=>{
      INSC=snap.docs.map(d=>({id:d.id,...d.data()}));
      if(window._curCodigo)showProfile(window._curCodigo);
    });
    fb.onSnapshot(fb.collection(db,'eventos'),snap=>{
      NOM_EVENTS=snap.docs.map(d=>({...d.data(),id:d.id})).filter(e=>e.status!=='archived');
    });
  }catch(e){console.warn('Firebase unavailable',e)}

  try{
    DB=await fetch('data.json').then(r=>r.json());
    const params=new URLSearchParams(location.search);
    const cod=params.get('codigo');
    if(cod)showProfile(cod.toUpperCase());
  }catch(e){console.warn('data.json unavailable',e)}
})();

// ── Helpers ──────────────────────────────────────────────
function nrm(s){return(s||'').normalize('NFD').replace(/[\u0300-\u036f]/g,'').toLowerCase().trim()}

function getPeerKey(a){
  const comps=[...(a.competencias||[])].filter(c=>c.sexo&&c.categoria).sort((x,y)=>(y.fecha||'').localeCompare(x.fecha||''));
  if(!comps.length)return null;
  const l=comps[0];
  const sex=(l.sexo||'').match(/mujer|fem/i)?'F':'M';
  return sex+'|'+(l.categoria||'').trim()+'|'+(l.division||'Open').trim();
}

function peerPerc(myTotal,key){
  const g=PEERS[key];
  if(!g)return null;
  const all=[...g.members.map(m=>m.total),myTotal].sort((a,b)=>b-a);
  const rank=all.indexOf(myTotal)+1;
  return{rank,n:all.length,pct:Math.round((1-rank/all.length)*100),g};
}

// ── Search ───────────────────────────────────────────────
window.onSearch=function(val){
  if(val.length<2){document.getElementById('sResults').innerHTML='';return}
  const q=nrm(val);
  const hits=DB.filter(a=>{
    const n=nrm(a.nombre), c=(a.codigo||'').toLowerCase();
    return n.includes(q)||c.includes(q)||q.split(' ').filter(w=>w.length>1).every(w=>n.includes(w));
  }).slice(0,8);
  document.getElementById('sResults').innerHTML=hits.length
    ? hits.map(a=>'<div class="result-item" onclick="showProfile(\''+a.codigo+'\')">'
        +'<div><div style="font-weight:600;font-size:14px">'+a.nombre+'</div>'
        +'<div style="font-size:11px;color:var(--muted);margin-top:2px">'+(a.club||'—')+' · '+(a.competencias||[]).length+' competencias</div></div>'
        +'<div style="text-align:right"><div style="font-family:Oswald;font-size:12px;color:var(--gold)">'+a.codigo+'</div>'
        +'<div style="font-size:10px;color:var(--muted)">'+(a.debut||'—')+'</div></div>'
      +'</div>').join('')
    : '<p style="color:var(--muted);font-size:13px">Sin resultados.</p>';
}
window.doSearch=function(){onSearch(document.getElementById('sInput').value)}

// ── Profile ──────────────────────────────────────────────
window.showProfile=function(codigo){
  window._curCodigo=codigo;
  const a=DB.find(x=>x.codigo===codigo);
  if(!a){
    document.getElementById('profileSection').innerHTML='<div class="empty">Atleta no encontrado.</div>';
    document.getElementById('profileSection').style.display='block';
    return;
  }
  history.replaceState(null,'','?codigo='+codigo);

  const bl=a.bestLifts||{};
  const allComps=a.competencias||[];
  const compsWithResults=allComps.filter(c=>c.resultado&&c.resultado.total>0);
  const sorted=[...compsWithResults].sort((x,y)=>(y.fecha||y.evento||'').localeCompare(x.fecha||x.evento||''));

  // Sex from most recent comp
  const sexRaw=[...allComps].sort((x,y)=>(y.fecha||'').localeCompare(x.fecha||'')).find(c=>c.sexo)?.sexo||'';
  const isFem=sexRaw.match(/mujer|fem/i);
  const sexLabel=isFem?'♀ Mujer':'♂ Hombre';
  const sexBadge=isFem?'b-r':'b-b';

  // Churn risk
  const lastFecha=allComps.filter(c=>c.fecha).sort((x,y)=>y.fecha.localeCompare(x.fecha))[0]?.fecha||null;
  const monthsSince=lastFecha?Math.floor((Date.now()-new Date(lastFecha))/(1000*60*60*24*30.4)):null;
  const churnRisk=monthsSince&&monthsSince>14;

  // GL history for chart
  const glHistory=[...compsWithResults]
    .filter(c=>c.resultado?.glp||c.resultado?.gl)
    .sort((x,y)=>(x.fecha||x.evento||'').localeCompare(y.fecha||y.evento||''));

  // Peer comparison
  const peerKey=getPeerKey(a);
  const peer=peerKey&&bl.total?peerPerc(bl.total,peerKey):null;
  const pg=peer?.g;

  // Active inscriptions
  const activeInsc=INSC.filter(i=>{
    if(i.status==='rejected')return false;
    return nrm(i.nombre)===nrm(a.nombre)||(i.codigo&&i.codigo===codigo);
  });

  const initials=a.nombre.split(' ').map(w=>w[0]).filter(Boolean).slice(0,2).join('').toUpperCase();

  let h='<button onclick="backToSearch()" style="display:flex;align-items:center;gap:6px;background:transparent;border:none;color:var(--muted);font-size:13px;cursor:pointer;margin-bottom:14px;padding:0">← Volver</button>';

  // ── Header ──────────────────────────────────────────────
  h+='<div class="card card-accent"><div style="display:flex;gap:14px;align-items:flex-start">'
    +'<div style="width:68px;height:68px;border-radius:12px;background:var(--bg);border:2px solid var(--border);display:flex;align-items:center;justify-content:center;flex-shrink:0">'
      +'<span class="os" style="font-size:26px;font-weight:700;color:var(--muted)">'+initials+'</span>'
    +'</div>'
    +'<div style="flex:1;min-width:0">'
      +'<div class="os" style="font-size:clamp(16px,4vw,24px);font-weight:700;letter-spacing:1px">'+a.nombre+'</div>'
      +'<div style="font-family:Oswald;font-size:12px;color:var(--gold);margin-top:2px">'+a.codigo+'</div>'
      +'<div style="font-size:12px;color:var(--muted);margin-top:3px">'+(a.club||'—')+(a.debut?' · Debut '+a.debut:'')+'</div>'
      +(churnRisk?'<div style="margin-top:8px;padding:7px 11px;background:rgba(245,158,11,.08);border:1px solid rgba(245,158,11,.3);border-radius:7px;font-size:11px;color:var(--gold)">⚡ '+monthsSince+' meses sin competir — ¡te esperamos pronto!</div>':'')
      +'<div style="margin-top:8px;display:flex;gap:6px;flex-wrap:wrap">'
        +(sexRaw?'<span class="badge '+sexBadge+'">'+sexLabel+'</span>':'')
        +'<span class="badge b-y">'+allComps.length+' competencia'+(allComps.length!==1?'s':'')+'</span>'
        +(compsWithResults.length?'<span class="badge b-g">'+compsWithResults.length+' resultado'+(compsWithResults.length!==1?'s':'')+'</span>':'')
      +'</div>'
    +'</div>'
  +'</div></div>';

  // ── PRs ─────────────────────────────────────────────────
  if(bl.sq||bl.bp||bl.dl||bl.total){
    h+='<div class="card"><div class="sec-title">Mejores marcas personales</div>'
      +'<div style="display:flex;gap:8px">';
    const lifts=[['SQ',bl.sq,'rgba(59,130,246,.2)','var(--blue)'],['BP',bl.bp,'rgba(245,158,11,.2)','var(--orange)'],['DL',bl.dl,'rgba(34,197,94,.2)','var(--green)'],['TOTAL',bl.total,'rgba(212,168,67,.25)','var(--gold)']];
    lifts.forEach(([lbl,val,bg,col])=>{
      h+='<div class="lift-box" style="border:1px solid '+bg+'">'
        +'<div style="font-size:9px;color:'+col+';font-family:Oswald;letter-spacing:1px">'+lbl+'</div>'
        +'<div class="os" style="font-size:'+(lbl==='TOTAL'?'22':'18')+'px;font-weight:700;color:'+col+';margin-top:2px">'+(val||'—')+'</div>'
        +(val?'<div style="font-size:9px;color:var(--muted)">kg</div>':'')
      +'</div>';
    });
    if(bl.glp){
      h+='<div class="lift-box" style="border:1px solid rgba(196,30,58,.25)">'
        +'<div style="font-size:9px;color:var(--accent);font-family:Oswald;letter-spacing:1px">GL PTS</div>'
        +'<div class="os" style="font-size:18px;font-weight:700;color:var(--accent);margin-top:2px">'+bl.glp+'</div>'
      +'</div>';
    }
    h+='</div></div>';
  }

  // ── GL chart ────────────────────────────────────────────
  if(glHistory.length>1){
    const W=340,H=80,PX=8,PY=8;
    const gls=glHistory.map(c=>c.resultado.glp||c.resultado.gl||0);
    const maxG=Math.max(...gls),minG=Math.min(...gls.filter(v=>v>0));
    const pts=glHistory.map((c,i)=>{
      const x=PX+i*(W-PX*2)/(glHistory.length-1);
      const y=PY+(H-PY*2)*(1-(gls[i]-minG)/Math.max(maxG-minG,1));
      return {x,y,v:gls[i],ev:c.evento||''};
    });
    const poly=pts.map(p=>p.x+','+p.y).join(' ');
    const area=PX+','+H+' '+poly+' '+pts[pts.length-1].x+','+H;
    h+='<div class="card"><div class="sec-title">Evolución GL Points</div>'
      +'<svg viewBox="0 0 '+(W)+'  '+(H+22)+'" style="width:100%;max-width:'+W+'px">'
      +'<defs><linearGradient id="gg" x1="0" y1="0" x2="0" y2="1"><stop offset="0%" stop-color="#D4A843" stop-opacity="0.3"/><stop offset="100%" stop-color="#D4A843" stop-opacity="0.02"/></linearGradient></defs>'
      +'<polygon points="'+area+'" fill="url(#gg)"/>'
      +'<polyline points="'+poly+'" fill="none" stroke="var(--gold)" stroke-width="2" stroke-linejoin="round" stroke-linecap="round"/>'
      +pts.map(p=>'<circle cx="'+p.x+'" cy="'+p.y+'" r="4" fill="var(--gold)" stroke="var(--bg)" stroke-width="2"/>'
        +'<text x="'+p.x+'" y="'+(p.y-8)+'" text-anchor="middle" font-size="9" fill="rgba(212,168,67,.9)" font-family="Oswald" font-weight="700">'+p.v+'</text>'
        +'<text x="'+p.x+'" y="'+(H+16)+'" text-anchor="middle" font-size="8" fill="rgba(120,143,166,.7)">'+((p.ev.match(/20\d\d/)||[''])[0])+'</text>'
      ).join('')
      +'</svg></div>';
  }

  // ── Peer comparison ─────────────────────────────────────
  if(peer&&pg){
    const pctColor=peer.pct>=75?'var(--green)':peer.pct>=50?'var(--gold)':'var(--accent)';
    const keyParts=peerKey.split('|');
    const peerLabel=(keyParts[0]==='F'?'Mujer':'Hombre')+' · '+keyParts[1]+' kg · '+keyParts[2];
    const maxT=pg.members[0]?.total||1;

    h+='<div class="card"><div class="sec-title">Comparativa en categoría</div>'
      +'<div style="font-size:11px;color:var(--muted);margin-bottom:12px">'+peerLabel+' · '+pg.n+' atletas en el grupo</div>'
      // Percentile gauge
      +'<div style="display:flex;align-items:center;gap:14px;margin-bottom:14px">'
        +'<div style="flex:1">'
          +'<div style="display:flex;justify-content:space-between;font-size:11px;margin-bottom:4px">'
            +'<span style="color:var(--muted)">Tu posición</span>'
            +'<span style="font-weight:700;color:'+pctColor+'">Top '+(100-peer.pct)+'% · #'+peer.rank+' de '+peer.n+'</span>'
          +'</div>'
          +'<div style="background:rgba(30,58,95,.4);border-radius:6px;height:10px;overflow:hidden">'
            +'<div style="background:'+pctColor+';height:100%;width:'+Math.max(peer.pct,4)+'%;border-radius:6px"></div>'
          +'</div>'
          +'<div style="display:flex;justify-content:space-between;font-size:9px;color:var(--muted);margin-top:3px">'
            +'<span>Mín</span><span>Promedio '+pg.avg+'</span><span>Top '+pg.top+'</span>'
          +'</div>'
        +'</div>'
        +'<div style="text-align:center;min-width:54px">'
          +'<div class="os" style="font-size:30px;font-weight:700;color:'+pctColor+'">'+peer.pct+'°</div>'
          +'<div style="font-size:9px;color:var(--muted)">PERCENTIL</div>'
        +'</div>'
      +'</div>'
      // Reference points
      +'<div style="display:grid;grid-template-columns:repeat(3,1fr);gap:8px;margin-bottom:14px">'
        +[['Promedio',pg.avg,'var(--muted)'],['Mediana',pg.p50,'var(--text)'],['Top 1',pg.top,'var(--gold)']].map(([lbl,val,col])=>
          '<div style="background:var(--bg);border-radius:8px;padding:8px;text-align:center">'
            +'<div style="font-size:9px;color:var(--muted);margin-bottom:2px">'+lbl+'</div>'
            +'<div class="os" style="font-size:17px;font-weight:700;color:'+col+'">'+val+'</div>'
          +'</div>'
        ).join('')
      +'</div>'
      // Top bar chart
      +'<div style="font-size:10px;color:var(--muted);margin-bottom:6px;font-family:Oswald;letter-spacing:1px">TOP DE LA CATEGORÍA</div>'
      +pg.members.map((m,i)=>{
        const isMe=m.codigo===a.codigo;
        const pct=Math.round(m.total/maxT*100);
        const col=isMe?'var(--accent)':i===0?'var(--gold)':'var(--blue)';
        return '<div style="display:flex;align-items:center;gap:8px;margin-bottom:5px">'
          +'<span style="font-size:10px;font-family:Oswald;color:'+(isMe?'var(--accent)':'var(--muted)')+';min-width:14px">'+(i+1)+'</span>'
          +'<div style="flex:1">'
            +'<div style="display:flex;justify-content:space-between;font-size:10px;margin-bottom:2px">'
              +'<span style="font-weight:'+(isMe?700:400)+';color:'+(isMe?'var(--accent)':'var(--text)')+'">'+m.nombre+(isMe?' ← tú':'')+'</span>'
              +'<span class="os" style="font-size:12px">'+m.total+' kg</span>'
            +'</div>'
            +'<div class="bar-bg"><div class="bar-fill" style="background:'+col+';width:'+pct+'%"></div></div>'
          +'</div>'
        +'</div>';
      }).join('')
    +'</div>';
  }

  // ── Active inscriptions ──────────────────────────────────
  if(activeInsc.length){
    h+='<div class="card"><div class="sec-title">Inscripciones activas</div>';
    activeInsc.forEach(i=>{
      const ev=NOM_EVENTS.find(e=>e.id===i.evento);
      const evName=ev?.name||i.evento;
      const ok=i.status==='approved';
      h+='<div class="comp-row" style="align-items:center">'
        +'<div><div style="font-weight:600;font-size:13px">'+evName+'</div>'
        +'<div style="font-size:11px;color:var(--muted);margin-top:3px">'+(i.division||'—')+' · '+(i.categoria||'—')+' · '+(i.modalidad||'—')+'</div>'
        +'<div style="font-size:11px;color:var(--muted)">'+(i.club||'—')+'</div></div>'
        +'<span class="badge '+(ok?'b-g':'b-y')+'" style="flex-shrink:0;margin-left:12px">'+(ok?'✓ Confirmado':'⏳ Pendiente')+'</span>'
      +'</div>';
    });
    h+='</div>';
  }

  // ── Competition history ──────────────────────────────────
  if(sorted.length){
    h+='<div class="card"><div class="sec-title">Historial de competencias ('+(sorted.length)+')</div>';
    sorted.forEach((c,ci)=>{
      const r=c.resultado||{};
      const prevTotal=sorted[ci+1]?.resultado?.total||0;
      const delta=prevTotal?r.total-prevTotal:null;
      const glVal=r.glp||r.gl||null;
      h+='<div class="comp-row">'
        +'<div style="flex:1;min-width:0">'
          +'<div style="font-size:13px;font-weight:500;white-space:nowrap;overflow:hidden;text-overflow:ellipsis">'+c.evento+'</div>'
          +'<div style="font-size:11px;color:var(--muted);margin-top:2px">'+(c.division||'—')+' · '+(c.categoria||'—')+(c.modalidad?' · '+c.modalidad:'')+'</div>'
          +(c.fecha?'<div style="font-size:10px;color:var(--muted)">'+c.fecha+'</div>':'')
          +'<div style="display:flex;gap:3px;flex-wrap:wrap;margin-top:4px">'
            +(r.sq?'<span style="font-size:9px;background:rgba(59,130,246,.1);color:var(--blue);padding:1px 5px;border-radius:3px">SQ '+r.sq+'</span>':'')
            +(r.bp?'<span style="font-size:9px;background:rgba(245,158,11,.1);color:var(--orange);padding:1px 5px;border-radius:3px">BP '+r.bp+'</span>':'')
            +(r.dl?'<span style="font-size:9px;background:rgba(34,197,94,.1);color:var(--green);padding:1px 5px;border-radius:3px">DL '+r.dl+'</span>':'')
          +'</div>'
        +'</div>'
        +'<div style="text-align:right;flex-shrink:0;margin-left:12px">'
          +'<div class="os" style="font-size:19px;font-weight:700;color:var(--gold)">'+r.total+' kg</div>'
          +(delta!==null?'<div style="font-size:11px;font-weight:700;color:'+(delta>0?'var(--green)':delta<0?'var(--red)':'var(--muted)')+'">'+  (delta>0?'+':'')+delta+' kg</div>':'')
          +(glVal?'<div style="font-size:10px;color:var(--muted)">GL '+glVal+(r.pos?' · #'+r.pos:'')+'</div>':'')
        +'</div>'
      +'</div>';
    });
    h+='</div>';
  } else {
    h+='<div class="card" style="text-align:center;padding:28px;color:var(--muted)">Sin resultados registrados.</div>';
  }

  const ps=document.getElementById('profileSection');
  ps.innerHTML=h;
  ps.style.display='block';
  document.getElementById('searchSection').style.display='none';
  window.scrollTo(0,0);
}

window.backToSearch=function(){
  document.getElementById('profileSection').style.display='none';
  document.getElementById('searchSection').style.display='block';
  window._curCodigo=null;
  history.replaceState(null,'','atleta.html');
}
</script>
</body>
</html>
